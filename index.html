<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familien App</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#121212;
    color:#eee;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
}

h1{
    font-size:22px;
    margin:20px 0;
}

.subtitle{
    color:#888;
    margin-bottom:30px;
    font-size:14px;
}

.grid{
    width:100%;
    max-width:350px;
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
}

.card{
    background:#1f1f1f;
    padding:18px;
    border-radius:14px;
    text-align:left;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
    border:1px solid #2a2a2a;
}

.card:hover{
    transform:scale(1.02);
    background:#252525;
}

.icon{
    font-size:20px;
    margin-right:8px;
}

.footer{
    margin-top:30px;
    font-size:12px;
    color:#666;
}
</style>
</head>

<body>

<h1>Familien App</h1>
<div class="subtitle">Dashboard</div>

<div class="grid">

    <div class="card" onclick="alert('kommt später: Termine')">
        Termine
    </div>

    <div class="card" onclick="alert('kommt später: ToDo Liste')">
        ToDo Liste
    </div>

    <div class="card" onclick="alert('kommt später: Spiele')">
        Spiele
    </div>

</div>

<div class="footer">
    Version 0.1 – Grundstruktur
</div>

</body>
</html>
